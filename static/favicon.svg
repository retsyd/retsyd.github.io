<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#0a0f1e"/>
  <!-- DNA double helix -->
  <g stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Left strand -->
    <path d="M30 15 Q50 30 70 35 Q50 40 30 55 Q50 70 70 75 Q50 80 30 95" stroke="#00f5d4"/>
    <!-- Right strand -->
    <path d="M70 15 Q50 30 30 35 Q50 40 70 55 Q50 70 30 75 Q50 80 70 95" stroke="#06d6a0"/>
    <!-- Base pairs -->
    <line x1="38" y1="25" x2="62" y2="25" stroke="#00f5d4" opacity="0.5" stroke-width="2"/>
    <line x1="32" y1="35" x2="68" y2="35" stroke="#06d6a0" opacity="0.5" stroke-width="2"/>
    <line x1="38" y1="45" x2="62" y2="45" stroke="#00f5d4" opacity="0.5" stroke-width="2"/>
    <line x1="32" y1="55" x2="68" y2="55" stroke="#06d6a0" opacity="0.5" stroke-width="2"/>
    <line x1="38" y1="65" x2="62" y2="65" stroke="#00f5d4" opacity="0.5" stroke-width="2"/>
    <line x1="32" y1="75" x2="68" y2="75" stroke="#06d6a0" opacity="0.5" stroke-width="2"/>
    <line x1="38" y1="85" x2="62" y2="85" stroke="#00f5d4" opacity="0.5" stroke-width="2"/>
  </g>
</svg>
